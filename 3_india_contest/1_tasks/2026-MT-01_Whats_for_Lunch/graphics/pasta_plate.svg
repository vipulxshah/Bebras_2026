<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#F0EDE8"/>
      <stop offset="100%" stop-color="#D8D0C4"/>
    </radialGradient>
    <radialGradient id="mb1grad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#A05030"/>
      <stop offset="100%" stop-color="#4E2208"/>
    </radialGradient>
    <radialGradient id="mb2grad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#9A4C2C"/>
      <stop offset="100%" stop-color="#4E2208"/>
    </radialGradient>
    <linearGradient id="plateRimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0EAE0"/>
      <stop offset="60%" stop-color="#E0D8CC"/>
      <stop offset="100%" stop-color="#B8AFA4"/>
    </linearGradient>
    <linearGradient id="plateFaceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FAF6F0"/>
      <stop offset="100%" stop-color="#EDE5D8"/>
    </linearGradient>
    <linearGradient id="sauceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E74C3C"/>
      <stop offset="100%" stop-color="#A93226"/>
    </linearGradient>
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00000030"/>
      <stop offset="100%" stop-color="#00000000"/>
    </linearGradient>
    <clipPath id="plateClip">
      <ellipse cx="200" cy="245" rx="158" ry="28"/>
    </clipPath>
    <clipPath id="foodClip">
      <!-- clip food to sit inside the plate rim -->
      <rect x="48" y="100" width="304" height="155"/>
    </clipPath>
  </defs>

  <!-- ── Plate base / foot ── -->
  <ellipse cx="200" cy="298" rx="80" ry="10" fill="#C8BFB4"/>
  <ellipse cx="200" cy="298" rx="80" ry="10" fill="url(#shadowGrad)"/>
  <!-- foot rim highlight -->
  <path d="M 124,296 A 80,10 0 0,1 276,296" stroke="#E0D8CE" stroke-width="2" fill="none"/>

  <!-- ── Plate body (the curved side wall) ── -->
  <!-- Dark underside -->
  <path d="M 42,255 Q 42,300 200,300 Q 358,300 358,255 L 358,258 Q 358,305 200,305 Q 42,305 42,258 Z"
        fill="#B0A898"/>
  <!-- Main plate wall -->
  <path d="M 42,245 Q 42,298 200,298 Q 358,298 358,245 L 358,252 Q 358,295 200,295 Q 42,295 42,252 Z"
        fill="url(#plateRimGrad)"/>
  <!-- Rim top highlight -->
  <path d="M 44,245 Q 44,290 200,290 Q 356,290 356,245"
        stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- ── Plate face (the flat top surface visible from side) ── -->
  <ellipse cx="200" cy="245" rx="158" ry="28" fill="url(#plateFaceGrad)"/>
  <!-- Inner well ellipse -->
  <ellipse cx="200" cy="243" rx="138" ry="22" fill="#F5EFE6"/>

  <!-- ── Sauce mound (sits in the well, visible from side as a dome) ── -->
  <ellipse cx="200" cy="241" rx="118" ry="18" fill="#C0392B"/>
  <!-- Sauce dome top curve — gives it 3D height -->
  <path d="M 82,241 Q 100,190 200,185 Q 300,190 318,241 Z" fill="url(#sauceGrad)"/>
  <!-- Sauce highlight -->
  <path d="M 110,210 Q 140,195 200,192 Q 250,192 275,205"
        stroke="#FF6B5B" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- ── Pasta noodles (side view — visible as layered wavy ribbons above sauce) ── -->
  <!-- Back noodle layers (darker, behind) -->
  <path d="M 95,230 Q 115,215 140,222 Q 165,230 175,218 Q 188,205 210,210 Q 230,216 245,205 Q 260,195 280,200 Q 300,207 315,200"
        stroke="#B8860B" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 88,235 Q 110,220 135,228 Q 158,236 172,224 Q 186,212 205,216 Q 225,222 242,212 Q 258,202 278,207 Q 300,214 318,207"
        stroke="#C8960E" stroke-width="4.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Mid noodle layers -->
  <path d="M 85,238 Q 108,224 132,232 Q 154,240 170,228 Q 185,216 205,221 Q 226,227 244,217 Q 262,207 282,213 Q 305,220 320,213"
        stroke="#D4A017" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 83,234 Q 106,219 128,227 Q 152,235 168,222 Q 183,210 202,215 Q 224,222 242,211 Q 260,200 280,206 Q 304,214 320,207"
        stroke="#E0B020" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Front noodle layers (lighter, in front) -->
  <path d="M 80,240 Q 105,225 130,234 Q 155,243 170,230 Q 186,217 207,222 Q 228,228 246,217 Q 264,207 285,213 Q 308,221 322,213"
        stroke="#DFB828" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M 78,237 Q 102,222 127,231 Q 150,240 166,227 Q 182,214 203,220 Q 225,226 244,215 Q 263,204 284,210 Q 307,218 322,210"
        stroke="#ECC030" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Foreground loose noodles for depth -->
  <path d="M 92,243 Q 118,230 144,239 Q 165,246 178,235 Q 192,222 214,228 Q 234,233 250,223"
        stroke="#F0C838" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- ── Meatballs (side view — round circles sitting proud of noodles) ── -->
  <!-- Meatball rear -->
  <circle cx="260" cy="210" r="24" fill="#5A2208"/>
  <circle cx="260" cy="210" r="24" fill="url(#mb2grad)"/>
  <ellipse cx="253" cy="203" rx="9" ry="6" fill="#B06040" opacity="0.4"/>
  <!-- Sauce drip on meatball -->
  <path d="M 270,224 Q 274,232 271,238" stroke="#C0392B" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Meatball front/centre -->
  <circle cx="175" cy="205" r="28" fill="#5A2208"/>
  <circle cx="175" cy="205" r="28" fill="url(#mb1grad)"/>
  <ellipse cx="167" cy="197" rx="11" ry="7" fill="#B06040" opacity="0.4"/>
  <!-- Sauce drip -->
  <path d="M 185,221 Q 190,231 187,238" stroke="#C0392B" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- ── Basil leaves (side view) ── -->
  <ellipse cx="220" cy="190" rx="16" ry="7" fill="#27AE60" transform="rotate(-25,220,190)"/>
  <line x1="220" y1="190" x2="223" y2="181" stroke="#1A7A40" stroke-width="1.5"/>
  <ellipse cx="148" cy="195" rx="13" ry="6" fill="#2ECC71" transform="rotate(18,148,195)"/>
  <line x1="148" y1="195" x2="145" y2="187" stroke="#1A7A40" stroke-width="1.5"/>

  <!-- ── Parmesan shavings ── -->
  <ellipse cx="200" cy="196" rx="9" ry="3.5" fill="#FFFADC" opacity="0.92" transform="rotate(-18,200,196)"/>
  <ellipse cx="240" cy="202" rx="7" ry="3"   fill="#FFF5C0" opacity="0.88" transform="rotate(12,240,202)"/>
  <ellipse cx="155" cy="200" rx="8" ry="3"   fill="#FFFADC" opacity="0.85" transform="rotate(-8,155,200)"/>
  <ellipse cx="295" cy="200" rx="6" ry="2.5" fill="#FFF5C0" opacity="0.82" transform="rotate(22,295,200)"/>

  <!-- ── Plate rim top edge highlight ── -->
  <path d="M 44,245 A 156,27 0 0,1 356,245"
        stroke="#FFFFFF" stroke-width="2.5" fill="none" opacity="0.55"/>

  <!-- ── Plate rim shadow (bottom of face ellipse) ── -->
  <path d="M 44,245 A 156,27 0 0,0 356,245"
        stroke="#A09080" stroke-width="2" fill="none" opacity="0.4"/>

</svg>
