<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bowlWallGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8DDD0"/>
      <stop offset="60%" stop-color="#CFC4B8"/>
      <stop offset="100%" stop-color="#A89E94"/>
    </linearGradient>
    <linearGradient id="bowlFaceGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5EFE8"/>
      <stop offset="100%" stop-color="#E0D8CC"/>
    </linearGradient>
    <linearGradient id="soupGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8A040"/>
      <stop offset="100%" stop-color="#B86818"/>
    </linearGradient>
    <radialGradient id="soupSurface" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F0B050"/>
      <stop offset="100%" stop-color="#C07820"/>
    </radialGradient>
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00000030"/>
      <stop offset="100%" stop-color="#00000000"/>
    </linearGradient>
  </defs>

  <!-- ── Bowl base / foot ── -->
  <ellipse cx="200" cy="305" rx="70" ry="9" fill="#B8AFA4"/>
  <ellipse cx="200" cy="305" rx="70" ry="9" fill="url(#shadowGrad)"/>
  <path d="M 132,303 A 70,9 0 0,1 268,303" stroke="#D8D0C6" stroke-width="2" fill="none"/>

  <!-- ── Bowl body — deeper than a plate ── -->
  <!-- Outer dark underside -->
  <path d="M 55,248 Q 55,308 200,308 Q 345,308 345,248 L 345,254 Q 345,312 200,312 Q 55,312 55,254 Z"
        fill="#A09088"/>
  <!-- Bowl wall -->
  <path d="M 55,235 Q 55,305 200,305 Q 345,305 345,235 L 345,244 Q 345,302 200,302 Q 55,302 55,244 Z"
        fill="url(#bowlWallGrad)"/>
  <!-- Inner bowl wall (darker, recessed) -->
  <path d="M 70,235 Q 70,295 200,295 Q 330,295 330,235 L 330,242 Q 330,290 200,290 Q 70,290 70,242 Z"
        fill="#C0B4A8"/>
  <!-- Wall highlight -->
  <path d="M 57,237 Q 57,298 200,298 Q 343,298 343,237"
        stroke="#FFFFFF" stroke-width="1.5" fill="none" opacity="0.45"/>

  <!-- ── Bowl rim (top ellipse) ── -->
  <ellipse cx="200" cy="235" rx="145" ry="24" fill="url(#bowlFaceGrad)"/>
  <!-- Rim inner edge -->
  <ellipse cx="200" cy="234" rx="128" ry="20" fill="#C8BEB4"/>

  <!-- ── Soup surface (slightly below rim) ── -->
  <ellipse cx="200" cy="238" rx="122" ry="19" fill="url(#soupSurface)"/>
  <!-- Soup sheen / highlight -->
  <path d="M 110,232 Q 150,224 200,222 Q 250,224 285,230"
        stroke="#F8CC70" stroke-width="2.5" fill="none" opacity="0.55" stroke-linecap="round"/>

  <!-- ── Steam wisps ── -->
  <path d="M 170,218 Q 165,205 170,195 Q 175,185 170,174"
        stroke="#DDDDDD" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 200,215 Q 195,200 200,188 Q 205,177 200,165"
        stroke="#DDDDDD" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.45"/>
  <path d="M 230,218 Q 235,204 230,193 Q 225,183 230,172"
        stroke="#DDDDDD" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- ── Vegetable chunks visible on soup surface ── -->
  <!-- Carrot slice -->
  <ellipse cx="165" cy="234" rx="12" ry="7" fill="#E8651A" transform="rotate(-10,165,234)"/>
  <ellipse cx="165" cy="234" rx="8" ry="4.5" fill="#F0802A" transform="rotate(-10,165,234)" opacity="0.7"/>
  <line x1="165" y1="228" x2="165" y2="240" stroke="#C85010" stroke-width="1" opacity="0.4" transform="rotate(-10,165,234)"/>

  <!-- Potato chunk -->
  <rect x="196" y="228" width="18" height="13" rx="3" fill="#E8D898" transform="rotate(8,205,234)"/>
  <rect x="199" y="231" width="12" height="8" rx="2" fill="#F0E4A8" transform="rotate(8,205,234)" opacity="0.6"/>

  <!-- Green pea -->
  <circle cx="240" cy="232" r="7" fill="#4CAF50"/>
  <ellipse cx="238" cy="230" rx="3" ry="2.2" fill="#81C784" opacity="0.6"/>

  <!-- Another carrot bit -->
  <ellipse cx="248" cy="238" rx="9" ry="5.5" fill="#E8651A" transform="rotate(15,248,238)"/>
  <ellipse cx="248" cy="238" rx="6" ry="3.5" fill="#F0802A" transform="rotate(15,248,238)" opacity="0.7"/>

  <!-- Celery piece -->
  <ellipse cx="182" cy="240" rx="10" ry="5" fill="#8BC34A" transform="rotate(-5,182,240)"/>
  <line x1="177" y1="240" x2="187" y2="240" stroke="#558B2F" stroke-width="1.2" opacity="0.5" transform="rotate(-5,182,240)"/>

  <!-- Onion bit -->
  <ellipse cx="222" cy="240" rx="9" ry="5" fill="#F5E6C8" transform="rotate(12,222,240)"/>

  <!-- ── Herb sprig on top ── -->
  <ellipse cx="200" cy="226" rx="10" ry="5" fill="#388E3C" transform="rotate(-20,200,226)"/>
  <line x1="200" y1="226" x2="202" y2="219" stroke="#2E7D32" stroke-width="1.5"/>
  <ellipse cx="188" cy="228" rx="8" ry="4" fill="#43A047" transform="rotate(15,188,228)"/>

  <!-- ── Bowl rim highlights / shadows ── -->
  <path d="M 57,235 A 143,23 0 0,1 343,235"
        stroke="#FFFFFF" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M 57,235 A 143,23 0 0,0 343,235"
        stroke="#887870" stroke-width="2" fill="none" opacity="0.4"/>

</svg>
